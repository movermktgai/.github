name: Content or SEO update
description: Request copy, SEO, schema, internal-link, or page content changes.
title: "[Content]: "
labels: ["type: content", "status: triage"]
body:
  - type: input
    id: route
    attributes:
      label: Page, URL, or content area
      placeholder: /locations/example/
    validations:
      required: true
  - type: dropdown
    id: change-type
    attributes:
      label: Change type
      options:
        - Copy edit
        - New page or section
        - SEO metadata
        - Schema or structured data
        - Internal links
        - Blog/content update
        - Local/service page update
        - Other
    validations:
      required: true
  - type: textarea
    id: request
    attributes:
      label: Requested change
      description: Describe the desired outcome in visitor-facing terms.
    validations:
      required: true
  - type: textarea
    id: source-of-truth
    attributes:
      label: Source of truth
      description: Link approved details, claims, service areas, rates, review information, or business facts.
    validations:
      required: false
  - type: checkboxes
    id: qa
    attributes:
      label: QA considerations
      options:
        - label: Repeated city/service pages may need content uniqueness QA.
        - label: Redirects, canonicals, or indexation may be affected.
        - label: Public claims, pricing, licensing, or reviews need source verification.
